<h3 class="mt-5">Formulario de MiHola</h3>

<label class="form-label">Ingresa un Nombre:</label>

<input
  type="text"
  class="form-control"
  placeholder="Ingresa el nombre"
  [(ngModel)]="setNombre">

<button
  class="btn btn-primary mt-3 etiqueta"
  (click)="evaluar()">

  Aceptar

</button>

<div class="mt-3">
  <label class="etiqueta">
    El nombre ingresado es: {{ setNombre }}
  </label>
</div>
